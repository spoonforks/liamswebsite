<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Works | Liam Cunningham</title>
  <link rel="stylesheet" href="academic-works.css">
</head>
<body class="museum-page">
  <main class="museum-stage" aria-label="Interactive museum hall">
    <div class="museum-scene" data-scene aria-hidden="true">
      <div class="museum-world" data-world></div>
    </div>
  </main>

  <div class="museum-overlay">
    <a class="museum-back-link" href="index.html">Back Home</a>

    <section class="museum-panel" aria-label="Academic Works scene information">
      <p class="museum-kicker">Academic Works</p>
      <h1 class="museum-title">Museum Hall Prototype</h1>
      <p class="museum-copy">
        Walk through the room with the arrow keys. The frames are ready for the academic projects
        you want to hang here next.
      </p>
      <p class="museum-controls">
        <span>Up / Down</span> walk
        <span>Left / Right</span> turn
      </p>
    </section>
  </div>

  <noscript>
    <div class="museum-noscript">
      This room uses JavaScript to render the 3D museum. Enable JavaScript to explore it.
    </div>
  </noscript>

  <script src="academic-works.js" defer></script>
</body>
</html>
